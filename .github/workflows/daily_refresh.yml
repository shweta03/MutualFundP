name: Daily Data Refresh (Scored Funds)

on:
  schedule:
    # 20:00 UTC = 1:30 AM IST — AMFI data fresh, mfapi low traffic
    # Runs Monday-Saturday, skip Sunday
    - cron: "0 20 * * 1-6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas numpy yfinance python-dateutil beautifulsoup4

      - name: Run data pipeline
        run: python generate_data.py

      - name: Commit data files
        run: |
          git config user.name  "MintingM Bot"
          git config user.email "bot@mintingm.in"
          git add data.json vix_data.json
          git diff --staged --quiet || git commit -m "📊 Data refresh $(TZ='Asia/Kolkata' date +'%d %b %Y %H:%M IST')"
          git push
