name: Daily Universe Expansion (All Funds)

on:
  schedule:
    # 22:00 UTC = 3:30 AM IST — runs after File 1 completes, still low traffic
    # Runs Monday-Saturday, skip Sunday
    - cron: "0 22 * * 1-6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  expand-universe:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas python-dateutil

      - name: Run universe expander
        run: python generate_universe.py

      - name: Commit updated data.json
        run: |
          git config user.name  "MintingM Bot"
          git config user.email "bot@mintingm.in"
          git add data.json
          git diff --staged --quiet || git commit -m "🌐 Universe expansion $(TZ='Asia/Kolkata' date +'%d %b %Y %H:%M IST')"
          git push
